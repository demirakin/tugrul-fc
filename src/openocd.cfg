# TUGRUL flight controller — OpenOCD configuration (M0 debug backbone)
# Target: STM32 Nucleo-F446RE, on-board ST-LINK/V2-1 over SWD.
#
# Two usage modes:
#   1) GDB server (foreground): openocd -f openocd.cfg
#        Leaves a GDB server listening on localhost:3333; connect with
#        `gdb -x debug.gdb` from a second terminal.
#   2) One-shot program via -c: openocd -f openocd.cfg \
#        -c "program build/tugrul-m0.elf verify reset exit"
#        Flashes, verifies, resets and exits (see the Makefile `flash` target).

# ---- Interface: on-board ST-LINK/V2-1 -----------------------------------
# Canonical script from OpenOCD's standard library (do not copy its contents).
source [find interface/stlink.cfg]

# ---- Transport: SWD -----------------------------------------------------
# Nucleo on-board ST-LINK exposes SWD only (no JTAG pins broken out).
# Modern OpenOCD (>= xPack 0.12 dev builds) uses the native st-link driver,
# whose SWD transport is named 'swd' (the legacy HLA name 'hla_swd' is gone).
transport select swd

# ---- Target: STM32F4x family --------------------------------------------
# Canonical target script; defines the F446 core, flash bank and reset logic.
source [find target/stm32f4x.cfg]

# ---- Adapter speed ------------------------------------------------------
# 2000 kHz is a safe, conservative SWD clock for the Nucleo on-board ST-LINK.
# Raise later only if signal integrity proves fine; slow is always reliable.
adapter speed 2000
